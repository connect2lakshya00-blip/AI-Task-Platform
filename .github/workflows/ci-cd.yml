name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to avoid redundant builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint all services
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Lint Backend
        working-directory: backend
        run: |
          npm ci --prefer-offline
          npm run lint

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm ci --prefer-offline
          npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Lint Python Worker
        working-directory: worker
        run: |
          pip install flake8
          flake8 worker.py --max-line-length=120 --ignore=E501

  # ─────────────────────────────────────────────
  # JOB 2: Build & push Docker images (main only)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive image tag from commit SHA
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args can be passed here if needed
          # build-args: |
          #   NODE_ENV=production

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Update K8s manifests → triggers Argo CD sync
  # ─────────────────────────────────────────────
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT (Personal Access Token) so the push triggers downstream workflows
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags in K8s manifests
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Replace image tags using a pattern that matches any existing tag
          sed -i "s|image: ${USERNAME}/ai-task-backend:.*|image: ${USERNAME}/ai-task-backend:${TAG}|g" k8s/backend.yaml
          sed -i "s|image: ${USERNAME}/ai-task-worker:.*|image: ${USERNAME}/ai-task-worker:${TAG}|g" k8s/worker.yaml
          sed -i "s|image: ${USERNAME}/ai-task-frontend:.*|image: ${USERNAME}/ai-task-frontend:${TAG}|g" k8s/frontend.yaml

          echo "Updated manifests to tag: ${TAG}"
          grep "image:" k8s/backend.yaml k8s/worker.yaml k8s/frontend.yaml

      - name: Commit and push manifest updates
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/worker.yaml k8s/frontend.yaml
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "ci: update image tags to ${TAG} [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────────
  # JOB 4: Notify on failure (optional — requires Slack webhook secret)
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, build-and-push, update-manifests]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: CI/CD pipeline failed on `main`.\nWorkflow: ${{ github.workflow }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
