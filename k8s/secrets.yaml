# Production Secret Management
#
# DO NOT commit real secrets to version control.
# This file contains a generated placeholder for local/staging use only.
#
# For production, manage secrets via one of:
#   - kubectl create secret generic app-secrets --from-literal=JWT_SECRET=<value> -n ai-task-platform
#   - External Secrets Operator (AWS Secrets Manager / HashiCorp Vault)
#   - Sealed Secrets (kubeseal)
#
# To regenerate a strong secret locally:
#   python3 -c "import secrets, base64; print(base64.b64encode(secrets.token_bytes(64)).decode())"
#
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-task-platform
  annotations:
    # Rotate this secret every 90 days in production
    secret.kubernetes.io/last-rotated: "2026-03-19"
type: Opaque
data:
